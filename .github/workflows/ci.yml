name: CI - Rapiti

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint + Accesibilidad
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Ejecutar ESLint (incluye jsx-a11y)
        run: npm run lint
        working-directory: frontend

  test:
    name: Tests unitarios
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Ejecutar tests
        run: npm test
        working-directory: frontend

  build:
    name: Build + Docker
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias frontend
        run: npm ci
        working-directory: frontend

      - name: Build del frontend
        run: npm run build
        working-directory: frontend

      - name: Validar Dockerfile
        run: |
          if [ -f Dockerfile ]; then
            echo "Dockerfile encontrado"
          else
            echo "Dockerfile NO encontrado"
            exit 1
          fi
